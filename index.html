<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Modern Portfolio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- NAVBAR -->
<header>
  <h2>MyPortfolio</h2>
  <nav>
    <a href="#home">Home</a>
    <a href="#projects">Projects</a>
    <a href="#contact">Contact</a>
    <button id="toggle">🌙</button>
  </nav>
</header>

<!-- HERO -->
<section id="home" class="hero">
  <h1>Hello, I'm <span>Viraj Desai</span></h1>
  <p id="typing"></p>
  <button>View Work</button>
</section>

<!-- PROJECTS -->
<section id="projects">
  <h2>Projects</h2>

  <div class="filters">
    <button onclick="filter('all')">All</button>
    <button onclick="filter('web')">Web</button>
    <button onclick="filter('app')">App</button>
  </div>

  <div class="project-grid">
    <div class="card web">Website Project</div>
    <div class="card app">App Project</div>
    <div class="card web">Portfolio Site</div>
  </div>
</section>

<!-- CONTACT -->
<section id="contact">
  <h2>Contact Me</h2>
  <form>
    <input type="text" placeholder="Your Name" required>
    <input type="email" placeholder="E-Mail" required>
    <textarea placeholder="Message"></textarea>
    <button type="submit">Send</button>
  </form>
</section>

<footer>
  <p>© 2026 Desai Viraj</p>
</footer>

<script src="script.js"></script>
</body>
</html>
